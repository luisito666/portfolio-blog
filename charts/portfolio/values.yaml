# Default values for portfolio.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: luisito666/blog
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: 0.1.18

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# Based on actual cluster usage (portfolio: ~1m CPU / 99Mi RAM, nginx: ~1m CPU / 5Mi RAM).
# Requests guarantee minimum allocation; limits cap maximum to prevent noisy neighbors.
resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

nginxResources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 64Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http

# Django container health probes using django-probes endpoints.
# These endpoints bypass ALLOWED_HOSTS validation, fixing HTTP 400 errors.
# Liveness uses a higher initialDelaySeconds to allow for Django startup and database migrations.
# Readiness uses a lower initialDelaySeconds since the app should respond quickly once running.
portfolioLivenessProbe:
  httpGet:
    path: /liveness
    port: 8000
    scheme: HTTP
  initialDelaySeconds: 15
  periodSeconds: 30
  failureThreshold: 3
  timeoutSeconds: 5

portfolioReadinessProbe:
  httpGet:
    path: /readiness
    port: 8000
    scheme: HTTP
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 3

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: 
  - name: cache-volume-static
    emptyDir:
      sizeLimit: 500Mi
  - name: media-volume
    persistentVolumeClaim:
      claimName: media-volume-claim

volumeMountsNginx: 
 - name: nginx-config
   mountPath: /etc/nginx/conf.d/
 - name: cache-volume-static
   mountPath: /var/www/static
 - name: media-volume
   mountPath: /var/www/media

volumesNginx:
 - name: nginx-config
   configMap:
     name: nginx-config

# Additional volumeMounts on the output Deployment definition.
volumeMounts: 
  - name: cache-volume-static
    mountPath: /app/staticfiles
  - name: media-volume
    mountPath: /app/media

nodeSelector: {}

tolerations: []

affinity: {}

# NetworkPolicy isolates pod traffic within the namespace.
# Default deny all ingress/egress, then allow only what's needed:
# - Ingress: NGINX Gateway (operations namespace) on port 80
# - Egress: DNS (kube-system/kube-dns) on port 53, PostgreSQL (192.168.17.20) on port 5432
#
# IMPORTANT NOTES:
# 1. Pod-internal loopback traffic (localhost:127.0.0.1) is NOT affected by NetworkPolicy
#    - NGINX container (port 80) communicates with Django (localhost:8000) without restrictions
# 2. PostgreSQL IP (192.168.17.20) must match the IP in postgres-portfolio-secrets secret
#    - If using hostname, the resolved IP must match this cidr
# 3. Gateway selector (operations/gateway-nginx) must match your actual Gateway configuration
#    - Verify: kubectl get pods -n operations -l app.kubernetes.io/name=gateway-nginx
#
# VALIDATION CHECKLIST:
# [ ] Gateway pod selector matches your actual Gateway configuration
# [ ] PostgreSQL IP matches your DATABASE_URL in postgres-portfolio-secrets
# [ ] CoreDNS pods exist in kube-system namespace with k8s-app=kube-dns label
# [ ] After deployment: test connectivity from a pod (see Test Plan below)
#
# TEST PLAN (after enabling):
# 1. Verify NetworkPolicy is active: kubectl get networkpolicy -n portfolio
# 2. Test website accessibility: curl -I https://luisito.dev
# 3. Test health checks: kubectl describe pod <pod-name> -n portfolio | grep -A 5 Liveness
# 4. Test PostgreSQL connectivity: kubectl exec -n portfolio <pod-name> -- nc -zv 192.168.17.20 5432
# 5. Verify isolation (should timeout): kubectl exec -n portfolio <pod-name> -- nc -zv <kube-system-pod-ip> 443
networkPolicy:
  enabled: true

configmap:
  ALLOWED_HOSTS: luisito.dev,www.luisito.dev
  CSRF_TRUSTED_ORIGINS: https://luisito.dev,https://www.luisito.dev
  # DEBUG must be "0" in production to prevent stack traces and
  # sensitive config from being exposed to end users.
  # Override via environment-specific values files (e.g. values-dev.yaml,
  # values-prod.yaml) rather than changing this default.
  DEBUG: "0"
  PDF_OWNER_NAME: Luis Albero Penagos
