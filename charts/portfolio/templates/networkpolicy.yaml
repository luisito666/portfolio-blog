{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "portfolio.fullname" . }}
  labels:
    {{- include "portfolio.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "portfolio.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from the NGINX Gateway (operations namespace)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: operations
          podSelector:
            matchLabels:
              app.kubernetes.io/name: gateway-nginx
      ports:
        - protocol: TCP
          port: 80
  egress:
    # Allow DNS resolution (CoreDNS in kube-system)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow outbound to PostgreSQL (external server 192.168.17.20)
    - to:
        - ipBlock:
            cidr: 192.168.17.20/32
      ports:
        - protocol: TCP
          port: 5432
{{- end }}
