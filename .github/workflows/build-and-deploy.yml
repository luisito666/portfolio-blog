name: Build and Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'charts/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'charts/**'

permissions:
  contents: write

jobs:
  test:
    name: Run Django tests
    runs-on: ubuntu-latest
    # Run tests on PRs and on push to main. The build job is push-to-main
    # only (no pull_request trigger) so it keeps its original behavior.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd src
          python manage.py test -v 2 --settings=core.test_settings

  build-and-deploy:
    # Only run on push to main (not pull_request) to preserve the original
    # behavior of tagging and pushing the image. Use workflow_run or branch
    # protection to gate this job on the test job if needed.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate semver tag
        run: |
          git fetch --tags
          LATEST_TAG=$(git tag -l 'v*.*.*' --sort=-version:refname | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v0.1.0"
          else
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          VERSION="${NEW_TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "NEW_TAG=$NEW_TAG" >> "$GITHUB_ENV"
          echo "New version: $VERSION"

      - name: Create and push git tag
        run: |
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            luisito666/blog:${{ env.VERSION }}
            luisito666/blog:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update dev.yaml image tag
        run: |
          sed -i "s|tag: .*|tag: ${{ env.VERSION }}|" charts/portfolio/values.yaml

      - name: Commit and push updated tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/portfolio/values.yaml
          git commit -m "chore: update image tag to ${{ env.VERSION }}"
          git push origin main
