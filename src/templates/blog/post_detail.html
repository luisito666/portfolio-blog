{% extends 'base.html' %}
{% load static %}

{% block title %}{{ post.title }} - {{ block.super }}{% endblock %}

{% block content %}
<!-- Hero Section -->
<section class="hero-section">
    <div class="container">
        <h1>{{ post.title }}</h1>
        <p>Published on {{ post.published_at|date:"F j, Y" }}</p>
    </div>
</section>

<article class="section blog-post-detail">
    {% if post.featured_image %}
    <img src="{{ post.featured_image.url }}" alt="{{ post.title }}" class="blog-post-image" style="margin-bottom: var(--spacing-xl);">
    {% endif %}
    
    <div class="blog-post-content">
        {{ post_html|safe }}
    </div>
    
    <footer class="blog-post-footer">
        <a href="{% url 'blog:post_list' %}" class="btn btn-outline">← Back to Blog</a>
    </footer>
</article>
{% endblock %}
